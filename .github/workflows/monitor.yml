name: Monitor Prezzi Alghero

on:
  schedule:
    - cron: '0 * * * *'  # ogni ora
  workflow_dispatch:       # avvio manuale dal sito

jobs:
  monitor:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Installa dipendenze
        run: pip install -r requirements.txt

      - name: Carica dati prezzi precedenti
        uses: actions/cache@v4
        with:
          path: data/prezzi.json
          key: prezzi-cache-${{ github.run_number }}
          restore-keys: |
            prezzi-cache-

      - name: Esegui bot
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python bot.py

      - name: Salva dati prezzi aggiornati
        uses: actions/cache/save@v4
        if: always()
        with:
          path: data/prezzi.json
          key: prezzi-cache-${{ github.run_number }}
