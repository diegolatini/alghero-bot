name: Monitor Prezzi Alghero

on:
  schedule:
    - cron: '0 * * * *'   # ogni ora
  workflow_dispatch:        # avvio manuale

permissions:
  contents: write           # serve per fare commit della dashboard

jobs:
  monitor:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Installa dipendenze
        run: pip install -r requirements.txt

      - name: Ripristina storico prezzi
        uses: actions/cache@v4
        with:
          path: data/storico.json
          key: storico-${{ github.run_number }}
          restore-keys: storico-

      - name: Esegui bot
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python bot.py

      - name: Pubblica dashboard su GitHub Pages
        run: |
          git config user.name "AlgheroBot"
          git config user.email "bot@alghero"
          git add docs/index.html data/storico.json || true
          git diff --staged --quiet || git commit -m "📊 Update dashboard $(date '+%d/%m %H:%M')"
          git push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Salva storico aggiornato
        uses: actions/cache/save@v4
        if: always()
        with:
          path: data/storico.json
          key: storico-${{ github.run_number }}
